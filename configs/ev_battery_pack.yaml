simulation:
  name: "EV Battery Pack Assembly"
  description: "Cell Stacking → Laser Welding → End-of-Line Testing"
  duration_hours: 8
  time_step_seconds: 1
  seed: 99

facility:
  name: "Gigafactory — Module Line 2"
  coordinate_system: cartesian_2d
  bounds: { width: 100, height: 50, unit: meters }

  # U-shaped layout: top row left→right, then down, then bottom row right→left
  locations:
    - id: cell_delivery
      type: spawn_point
      position: { x: 10, y: 12 }

    - id: cell_buffer
      type: buffer
      position: { x: 28, y: 12 }
      capacity: 12

    - id: stacker_1
      type: machine
      position: { x: 46, y: 12 }
      capacity: 1
      properties: { cycle_time_mean: 90, mtbf_hours: 300 }

    - id: stacker_2
      type: machine
      position: { x: 64, y: 12 }
      capacity: 1
      properties: { cycle_time_mean: 90, mtbf_hours: 300 }

    - id: stacked_module_queue
      type: buffer
      position: { x: 80, y: 25 }
      capacity: 6

    - id: laser_welder
      type: machine
      position: { x: 64, y: 38 }
      capacity: 1
      properties: { cycle_time_mean: 150, mtbf_hours: 400 }

    - id: welded_module_queue
      type: buffer
      position: { x: 46, y: 38 }
      capacity: 4

    - id: eol_tester
      type: machine
      position: { x: 28, y: 38 }
      capacity: 1
      properties: { cycle_time_mean: 45, mtbf_hours: 800 }

    - id: pack_output
      type: exit_point
      position: { x: 10, y: 38 }

  paths:
    - from: cell_delivery
      to: cell_buffer
      distance: 18
    - from: cell_buffer
      to: stacker_1
      distance: 18
    - from: cell_buffer
      to: stacker_2
      distance: 36
    - from: stacker_1
      to: stacked_module_queue
      distance: 22
    - from: stacker_2
      to: stacked_module_queue
      distance: 20
    - from: stacked_module_queue
      to: laser_welder
      distance: 20
    - from: laser_welder
      to: welded_module_queue
      distance: 18
    - from: welded_module_queue
      to: eol_tester
      distance: 18
    - from: eol_tester
      to: pack_output
      distance: 18

state_graphs:
  product_flow:
    states:
      waiting:
        type: queued
        description: "Waiting in buffer for next station"
        queue_discipline: FIFO

      in_transit:
        type: moving
        description: "Moving on AGV between stations"
        speed:
          distribution: constant
          params: { value: 1.5 }

      cell_stacking:
        type: stationary
        description: "Stacking prismatic cells into module frame with thermal pads"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 90, std: 10 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: cell_stacking_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: cell_stacking_completed

      laser_welding:
        type: stationary
        description: "Laser welding busbar connections between cells"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 150, std: 18 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: laser_welding_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: laser_welding_completed

      eol_testing:
        type: stationary
        description: "End-of-line voltage, impedance, and leak test"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 45, std: 8 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: eol_testing_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: eol_testing_completed

      done:
        type: terminal
        description: "Module passed — ready for pack integration"
        on_enter:
          - action: emit_event
            event_type: module_completed
          - action: destroy_entity

    transitions:
      - from: waiting
        to: in_transit
        condition:
          type: resource_available
          resource_type: machine
        priority: 1

      - from: in_transit
        to: waiting
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: resource_busy
              resource_type: machine
        priority: 1

      - from: in_transit
        to: cell_stacking
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "<"
              value: 2
        priority: 2

      - from: in_transit
        to: laser_welding
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "=="
              value: 2
        priority: 2

      - from: in_transit
        to: eol_testing
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "=="
              value: 3
        priority: 2

      - from: in_transit
        to: done
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: ">"
              value: 3
        priority: 2

      - from: cell_stacking
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

      - from: laser_welding
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

      - from: eol_testing
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

entity_types:
  battery_module:
    state_graph: product_flow
    initial_state: waiting
    spawn_rule: schedule
    properties:
      product_type:
        type: categorical
        values: [standard_range, long_range]
        weights: [0.6, 0.4]
      station_index:
        type: integer
        initial: 0

schedule:
  type: poisson
  rate_per_hour: 24
  shifts:
    - name: morning
      start: "06:00"
      end: "14:00"
      rate_multiplier: 1.0
    - name: afternoon
      start: "14:00"
      end: "22:00"
      rate_multiplier: 0.9
    - name: night
      start: "22:00"
      end: "06:00"
      rate_multiplier: 0.5
