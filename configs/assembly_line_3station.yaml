simulation:
  name: "Smartphone Chassis Line"
  description: "CNC Milling → Press-Fit Assembly → CMM Inspection"
  duration_hours: 8
  time_step_seconds: 1
  seed: 42

facility:
  name: "CNC Machining Center — Chassis Line 1"
  coordinate_system: cartesian_2d
  bounds: { width: 100, height: 50, unit: meters }

  locations:
    - id: raw_billet_intake
      type: spawn_point
      label: "Intake"
      position: { x: 5, y: 25 }

    - id: billet_queue
      type: buffer
      label: "Queue"
      position: { x: 18, y: 25 }
      capacity: 10

    - id: cnc_mill_1
      type: machine
      label: "CNC Mill 1"
      position: { x: 33, y: 13 }
      capacity: 1
      properties: { cycle_time_mean: 120, mtbf_hours: 200 }
      deviations:
        cycle_time_factor: 1.0
        cycle_time_variability: 1.0
        failure_probability: 0.0
        failure_duration_mean: 300
        failure_duration_std: 60
        degradation_rate: 0.0
        quality_defect_rate: 0.0

    - id: cnc_mill_2
      type: machine
      label: "CNC Mill 2"
      position: { x: 33, y: 37 }
      capacity: 1
      properties: { cycle_time_mean: 120, mtbf_hours: 200 }
      deviations:
        cycle_time_factor: 1.0
        cycle_time_variability: 1.0
        failure_probability: 0.0
        failure_duration_mean: 300
        failure_duration_std: 60
        degradation_rate: 0.0
        quality_defect_rate: 0.0

    - id: milled_chassis_queue
      type: buffer
      label: "Queue"
      position: { x: 48, y: 25 }
      capacity: 8

    - id: press_fit_station
      type: machine
      label: "Press Fit"
      position: { x: 62, y: 25 }
      capacity: 1
      properties: { cycle_time_mean: 180, mtbf_hours: 500 }
      deviations:
        cycle_time_factor: 1.0
        cycle_time_variability: 1.0
        failure_probability: 0.0
        failure_duration_mean: 300
        failure_duration_std: 60
        degradation_rate: 0.0
        quality_defect_rate: 0.0

    - id: assembled_chassis_queue
      type: buffer
      label: "Queue"
      position: { x: 76, y: 25 }
      capacity: 5

    - id: cmm_inspector
      type: machine
      label: "CMM"
      position: { x: 88, y: 25 }
      capacity: 1
      properties: { cycle_time_mean: 60, mtbf_hours: 1000 }
      deviations:
        cycle_time_factor: 1.0
        cycle_time_variability: 1.0
        failure_probability: 0.0
        failure_duration_mean: 300
        failure_duration_std: 60
        degradation_rate: 0.0
        quality_defect_rate: 0.0

    - id: finished_goods_out
      type: exit_point
      label: "Output"
      position: { x: 97, y: 25 }

  paths:
    - from: raw_billet_intake
      to: billet_queue
      distance: 13
    - from: billet_queue
      to: cnc_mill_1
      distance: 18
    - from: billet_queue
      to: cnc_mill_2
      distance: 18
    - from: cnc_mill_1
      to: milled_chassis_queue
      distance: 18
    - from: cnc_mill_2
      to: milled_chassis_queue
      distance: 18
    - from: milled_chassis_queue
      to: press_fit_station
      distance: 14
    - from: press_fit_station
      to: assembled_chassis_queue
      distance: 14
    - from: assembled_chassis_queue
      to: cmm_inspector
      distance: 12
    - from: cmm_inspector
      to: finished_goods_out
      distance: 9

state_graphs:
  product_flow:
    states:
      waiting:
        type: queued
        description: "Waiting in buffer for next station"
        queue_discipline: FIFO

      in_transit:
        type: moving
        description: "Moving between stations on conveyor"
        speed:
          distribution: constant
          params: { value: 1.5 }

      cnc_milling:
        type: stationary
        description: "CNC rough + finish milling of aluminum chassis from billet"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 120, std: 15 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: cnc_milling_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: cnc_milling_completed

      press_fitting:
        type: stationary
        description: "Press-fit antenna bands, button brackets, and SIM tray rails"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 180, std: 20 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: press_fitting_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: press_fitting_completed

      cmm_inspection:
        type: stationary
        description: "CMM dimensional check, surface finish measurement, tolerance verification"
        location_type: machine
        duration:
          distribution: normal
          params: { mean: 60, std: 10 }
        on_enter:
          - action: acquire_resource
            resource_type: machine
          - action: emit_event
            event_type: cmm_inspection_started
        on_exit:
          - action: release_resource
            resource_type: machine
          - action: emit_event
            event_type: cmm_inspection_completed

      done:
        type: terminal
        description: "Chassis completed — ready for anodizing"
        on_enter:
          - action: emit_event
            event_type: chassis_completed
          - action: destroy_entity

    transitions:
      - from: waiting
        to: in_transit
        condition:
          type: resource_available
          resource_type: machine
        priority: 1

      - from: in_transit
        to: waiting
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: resource_busy
              resource_type: machine
        priority: 1

      - from: in_transit
        to: cnc_milling
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "<"
              value: 2
        priority: 2

      - from: in_transit
        to: press_fitting
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "=="
              value: 2
        priority: 2

      - from: in_transit
        to: cmm_inspection
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: "=="
              value: 3
        priority: 2

      - from: in_transit
        to: done
        condition:
          type: and
          conditions:
            - type: arrived_at_destination
            - type: property_threshold
              property: station_index
              operator: ">"
              value: 3
        priority: 2

      - from: cnc_milling
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

      - from: press_fitting
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

      - from: cmm_inspection
        to: in_transit
        condition:
          type: duration_elapsed
        priority: 1
        next_location: { type: next_in_sequence }

entity_types:
  chassis:
    state_graph: product_flow
    initial_state: waiting
    spawn_rule: schedule
    properties:
      product_type:
        type: categorical
        values: [base_model, pro_model]
        weights: [0.7, 0.3]
      station_index:
        type: integer
        initial: 0

schedule:
  type: poisson
  rate_per_hour: 20
  shifts:
    - name: morning
      start: "06:00"
      end: "14:00"
      rate_multiplier: 1.0
    - name: afternoon
      start: "14:00"
      end: "22:00"
      rate_multiplier: 0.9
    - name: night
      start: "22:00"
      end: "06:00"
      rate_multiplier: 0.5
