simulation:
  name: Electric Vehicle Assembly Plant
  description: "Battery Cell \u2192 Battery Pack \u2192 Motor Assembly \u2192 Power\
    \ Electronics \u2192 Chassis Stamping \u2192 Body Welding \u2192 Painting \u2192\
    \ Drivetrain Integration \u2192 Battery Install \u2192 Interior \u2192 Exterior\
    \ \u2192 Final Assembly \u2192 QC \u2192 End-of-Line Test"
