    state_graph: product_flow
    initial_state: waiting
    spawn_rule: schedule
    properties:
      station_index:
        type: integer
        initial: 0
schedule:
  type: poisson
  rate_per_hour: 20.0
  shifts:
  - name: morning
    start: 06:00
    end: '14:00'
    rate_multiplier: 1.0
  - name: afternoon
    start: '14:00'
    end: '22:00'
    rate_multiplier: 0.9
  - name: night
    start: '22:00'
    end: 06:00
    rate_multiplier: 0.5
