resources:
  apps:
    industrial_digital_twin:
      name: industrial-digital-twin-${bundle.target}
      description: "Industrial Digital Twin - Configurable state machine simulation"
      source_code_path: ..
      config:
        env:
          - name: LAKEBASE_HOST
            value: "${var.lakebase_host}"
          - name: LAKEBASE_PORT
            value: "5432"
          - name: LAKEBASE_DATABASE
            value: "databricks_postgres"
          - name: LAKEBASE_SCHEMA
            value: "public"
          - name: LAKEBASE_ENDPOINT_NAME
            value: "projects/industrial-digital-twin/branches/${var.lakebase_branch}/endpoints/primary"
          - name: LAKEBASE_USE_OAUTH
            value: "true"
          - name: SIM_CONFIGS_DIR
            value: "/Volumes/serverless_stable_3n0ihb_catalog/industrial_digital_twin/raw_data/configs"
